<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- CURSOR -->

<div class="cursor-dot"></div>

<!-- FORM -->

<div class="container">

    <div class="logo">
        <span>🛡</span>
        <h1>Create Account</h1>
    </div>

    <p class="subtitle">
        Secure your financial identity with
        Vaultix AI-powered fraud protection.
    </p>

    <form id="signupForm">

        <!-- NAME -->

        <div class="input-box">

            <label>Full Name</label>

            <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            >

            <small id="nameError"></small>

        </div>

        <!-- EMAIL -->

        <div class="input-box">

            <label>Email Address</label>

            <input
            type="text"
            id="email"
            placeholder="Enter your email"
            >

            <small id="emailError"></small>

        </div>

        <!-- PHONE -->

        <div class="input-box">

            <label>Phone Number</label>

            <input
            type="text"
            id="phone"
            placeholder="Enter your phone number"
            >

            <small id="phoneError"></small>

        </div>

        <!-- AGE -->

        <div class="input-box">

            <label>Age</label>

            <input
            type="text"
            id="age"
            placeholder="Enter your age"
            >

            <small id="ageError"></small>

        </div>

        <!-- DOB -->

        <div class="input-box">

            <label>Date Of Birth</label>

            <input
            type="date"
            id="dob"
            >

            <small id="dobError"></small>

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <label>Create Password</label>

            <input
            type="password"
            id="password"
            placeholder="Create secure password"
            >

            <small id="passError"></small>

        </div>
        <!-- CONFIRM PASSWORD -->

<div class="input-box">

    <label>Confirm Password</label>

    <input
    type="password"
    id="confirmPassword"
    placeholder="Confirm your password"
    >

    <small id="confirmPassError"></small>

</div>
        <!-- TERMS -->

        <div class="terms">

            <input type="checkbox" id="terms">

            <label for="terms">
                I agree to the Terms & Conditions and
                Vaultix security policies.
            </label>

        </div>

        <small id="termsError"></small>

        <!-- BUTTON -->

        <button type="submit" class="create-btn">
            Create Secure Account
        </button>

    </form>
    <div style="text-align: center;">
        <button class="back-btn" onclick="window.location.href='index.html'">
            Back To Home
        </button>
    </div>

    </div>



<script src="../js/script.js"></script>

</body>
</html>
