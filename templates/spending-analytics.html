<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spending Analytics</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="cursor-dot"></div>

<div class="container">

<div class="logo">
<span>📊</span>
<h1>Spending Analytics</h1>
</div>

<p class="subtitle">
Analyze your spending patterns and transaction activity.
</p>

<div class="analytics-grid">

<div class="analytics-card">
<h2>Total Spending</h2>
<p id="totalSpend">₹25,000</p>
</div>

<div class="analytics-card">
<h2>Food</h2>
<p id="foodSpend">₹5,000</p>
</div>

<div class="analytics-card">
<h2>Shopping</h2>
<p id="shoppingSpend">₹12,000</p>
</div>

<div class="analytics-card">
<h2>Travel</h2>
<p id="travelSpend">₹8,000</p>
</div>

</div>

<div class="fraud-box">

<h2>Highest Spending Category</h2>

<p id="highestCategory">
Shopping - ₹12,000
</p>

</div>

<div class="btn-box">

<button id="analyzeSpendingBtn">
Analyze Spending
</button>

</div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
