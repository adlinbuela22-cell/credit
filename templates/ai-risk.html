<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Risk Analysis</title>

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="cursor-dot"></div>

<div class="container">

<div class="logo">
<span>🤖</span>
<h1>AI Risk Analysis</h1>
</div>

<p class="subtitle">
Analyze transaction risk using AI-powered fraud detection.
</p>

<div class="risk-grid">

<div class="risk-card">
<h2>Transaction Amount</h2>
<p id="amountRisk">₹50,000</p>
</div>

<div class="risk-card">
<h2>Location Risk</h2>
<p id="locationRisk">Low Risk ✅</p>
</div>

<div class="risk-card">
<h2>Device Risk</h2>
<p id="deviceRisk">Low Risk ✅</p>
</div>

<div class="risk-card">
<h2>Overall Risk Score</h2>
<p id="riskScore">18%</p>
</div>

</div>

<div class="fraud-box">

<h2>AI Prediction</h2>

<p id="aiStatus">
Transaction appears safe.
</p>

</div>

<div class="btn-box">

<button id="analyzeBtn">
Run AI Analysis
</button>

<button class="secondary-btn"
onclick="window.location.href='index.html'">
Back
</button>

</div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
